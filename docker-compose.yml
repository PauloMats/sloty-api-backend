services:
  postgres:
    image: postgres:16-alpine
    container_name: sloty-postgres
    environment:
      POSTGRES_USER: sloty
      POSTGRES_PASSWORD: sloty
      POSTGRES_DB: sloty
    ports:
      - "${POSTGRES_PORT:-5434}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sloty -d sloty"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    container_name: sloty-redis
    ports:
      - "${REDIS_PORT:-6380}:6379"
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
